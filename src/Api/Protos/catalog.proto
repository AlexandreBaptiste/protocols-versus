syntax = "proto3";

option csharp_namespace = "Api.Grpc";

package catalog;

// Category messages
message CategoryReply {
  string id = 1;
  string name = 2;
  string description = 3;
}

message GetCategoriesRequest {}

message GetCategoriesReply {
  repeated CategoryReply categories = 1;
}

message GetCategoryRequest {
  string id = 1;
}

// Product messages
message ProductReply {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  string currency = 5;
  int32 stock_quantity = 6;
  string category_id = 7;
}

message GetProductsRequest {
  int32 limit = 1; // 0 means no limit
}

message GetProductsReply {
  repeated ProductReply products = 1;
}

message GetProductRequest {
  string id = 1;
}

message SearchProductsRequest {
  string name = 1;
  double min_price = 2;
  double max_price = 3;
}

// Order messages
message OrderItemReply {
  string id = 1;
  string product_id = 2;
  string product_name = 3;
  int32 quantity = 4;
  double unit_price = 5;
  double total_price = 6;
}

message OrderReply {
  string id = 1;
  string customer_name = 2;
  string created_at = 3;
  repeated OrderItemReply items = 4;
  double total_amount = 5;
}

message GetOrdersRequest {}

message GetOrdersReply {
  repeated OrderReply orders = 1;
}

message GetOrderRequest {
  string id = 1;
}

message CreateOrderItemRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message CreateOrderRequest {
  string customer_name = 1;
  repeated CreateOrderItemRequest items = 2;
}

// Stream message for real-time product updates
message ProductStreamReply {
  ProductReply product = 1;
  string event_type = 2;
}

message StreamProductsRequest {}

// Service definitions
service CatalogGrpcService {
  rpc GetCategories (GetCategoriesRequest) returns (GetCategoriesReply);
  rpc GetCategory (GetCategoryRequest) returns (CategoryReply);
  rpc GetProducts (GetProductsRequest) returns (GetProductsReply);
  rpc GetProduct (GetProductRequest) returns (ProductReply);
  rpc SearchProducts (SearchProductsRequest) returns (GetProductsReply);
  rpc GetOrders (GetOrdersRequest) returns (GetOrdersReply);
  rpc GetOrder (GetOrderRequest) returns (OrderReply);
  rpc CreateOrder (CreateOrderRequest) returns (OrderReply);
  rpc StreamProducts (StreamProductsRequest) returns (stream ProductReply);
}
